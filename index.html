<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>李宇佳作品集 | Web Portfolio</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #151515;
      --muted: #6d6a64;
      --paper: #f5f0e8;
      --panel: rgba(255, 252, 246, 0.88);
      --line: rgba(23, 23, 23, 0.14);
      --accent: #a8422d;
      --shadow: 0 22px 70px rgba(31, 28, 24, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background:
        linear-gradient(90deg, rgba(21, 21, 21, 0.04) 1px, transparent 1px),
        linear-gradient(180deg, #f8f4ed 0%, #ece6dc 58%, #f7f3eb 100%);
      background-size: 56px 56px, 100% 100%;
      color: var(--ink);
      font-family: "Inter", "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      letter-spacing: 0;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 18px;
      align-items: center;
      min-height: 68px;
      padding: 14px clamp(18px, 4vw, 54px);
      border-bottom: 1px solid var(--line);
      background: rgba(248, 244, 237, 0.84);
      backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .brand strong {
      font-size: 18px;
      line-height: 1.15;
      font-weight: 760;
    }

    .brand span {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }

    .jump {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .jump a,
    .counter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 0 13px;
      border: 1px solid rgba(28, 28, 28, 0.14);
      border-radius: 999px;
      background: rgba(255, 252, 246, 0.7);
      color: #2c2c2c;
      font-size: 13px;
      white-space: nowrap;
    }

    .jump a:hover,
    .jump a:focus-visible {
      border-color: var(--accent);
      outline: none;
      color: var(--accent);
    }

    .counter {
      min-width: 82px;
      font-variant-numeric: tabular-nums;
    }

    .hero {
      min-height: calc(100svh - 68px);
      display: grid;
      grid-template-columns: minmax(260px, 0.78fr) minmax(320px, 1.45fr);
      gap: clamp(24px, 4vw, 62px);
      align-items: center;
      padding: clamp(24px, 5vw, 64px) clamp(18px, 4vw, 54px) 34px;
      overflow: hidden;
    }

    .hero-copy {
      align-self: stretch;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 22px;
      max-width: 520px;
    }

    .eyebrow {
      color: var(--accent);
      font-size: 13px;
      font-weight: 760;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(44px, 7vw, 104px);
      line-height: 0.92;
      font-weight: 820;
    }

    .intro {
      max-width: 450px;
      color: #454548;
      font-size: 16px;
      line-height: 1.75;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 17px;
      border-radius: 999px;
      border: 1px solid rgba(21, 21, 21, 0.18);
      background: #171717;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
    }

    .button.secondary {
      background: rgba(255, 252, 246, 0.72);
      color: var(--ink);
    }

    .attachments {
      padding: 0 clamp(18px, 4vw, 54px) 34px;
    }

    .attachment-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      max-width: 1120px;
      margin: 0 auto;
    }

    .attachment-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      min-height: 132px;
      padding: 22px;
      border: 1px solid rgba(21, 21, 21, 0.12);
      border-radius: 8px;
      background: rgba(255, 252, 246, 0.78);
      box-shadow: 0 16px 48px rgba(31, 28, 24, 0.11);
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .attachment-card:hover,
    .attachment-card:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(168, 66, 45, 0.55);
      box-shadow: 0 24px 70px rgba(31, 28, 24, 0.16);
      outline: none;
    }

    .attachment-card span {
      color: var(--accent);
      font-size: 12px;
      font-weight: 760;
      text-transform: uppercase;
    }

    .attachment-card strong {
      display: block;
      margin-top: 8px;
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1.05;
    }

    .attachment-card p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .attachment-arrow {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #171717;
      color: #fff;
      font-size: 20px;
      line-height: 1;
    }

    .demo-card {
      background:
        linear-gradient(135deg, rgba(255, 252, 246, 0.88), rgba(239, 224, 208, 0.72)),
        rgba(255, 252, 246, 0.78);
    }

    .cover-stage {
      align-self: stretch;
      display: grid;
      place-items: center;
      min-height: 420px;
      overflow: hidden;
      perspective: 1400px;
    }

    .cover-stack {
      position: relative;
      width: min(100%, 880px);
      aspect-ratio: 16 / 9;
    }

    .cover-stack img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      border: 1px solid rgba(21, 21, 21, 0.12);
      box-shadow: var(--shadow);
      background: #f8f8f8;
    }

    .cover-stack img:first-child {
      transform: translate(-5%, 8%);
      filter: saturate(0.92);
    }

    .cover-stack img:last-child {
      transform: translate(5%, -4%);
    }

    .thumb-rail {
      position: sticky;
      top: 68px;
      z-index: 15;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 10px clamp(18px, 4vw, 54px);
      border-bottom: 1px solid rgba(28, 28, 28, 0.1);
      background: rgba(244, 240, 232, 0.82);
      backdrop-filter: blur(16px);
      scrollbar-width: thin;
    }

    .thumb {
      flex: 0 0 auto;
      width: 90px;
      aspect-ratio: 16 / 9;
      border: 2px solid transparent;
      border-radius: 7px;
      overflow: hidden;
      background: #fff;
      opacity: 0.66;
      transition: opacity 160ms ease, border-color 160ms ease, transform 160ms ease;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #f8f8f8;
    }

    .thumb.is-active,
    .thumb:hover,
    .thumb:focus-visible {
      opacity: 1;
      border-color: var(--accent);
      outline: none;
      transform: translateY(-1px);
    }

    main {
      padding: 34px 0 72px;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      padding: 46px clamp(18px, 4vw, 54px) 22px;
    }

    .section-head h2 {
      margin: 0;
      font-size: clamp(28px, 4vw, 54px);
      line-height: 1;
    }

    .section-head p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      font-variant-numeric: tabular-nums;
    }

    .page {
      width: min(1440px, calc(100% - clamp(26px, 7vw, 104px)));
      margin: 0 auto clamp(34px, 5vw, 58px);
      scroll-margin-top: 146px;
    }

    .page-shell {
      overflow: hidden;
      border: 1px solid rgba(21, 21, 21, 0.12);
      background: #f8f8f8;
      box-shadow: var(--shadow);
    }

    .page img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
    }

    .page-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 11px 2px 0;
      color: var(--muted);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    .back-top {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 25;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 1px solid rgba(21, 21, 21, 0.14);
      background: rgba(255, 252, 246, 0.9);
      color: var(--ink);
      font-size: 20px;
      line-height: 1;
      box-shadow: 0 12px 38px rgba(0, 0, 0, 0.12);
      cursor: pointer;
    }

    @media (max-width: 900px) {
      .topbar {
        grid-template-columns: 1fr auto;
      }

      .counter {
        display: none;
      }

      .hero {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .cover-stage {
        min-height: auto;
        padding: 20px 0 12px;
      }

      .cover-stack {
        width: min(88vw, 620px);
      }
    }

    @media (max-width: 620px) {
      .topbar {
        min-height: 62px;
        padding: 11px 14px;
      }

      .brand strong {
        font-size: 15px;
      }

      .brand span {
        display: none;
      }

      .jump a {
        min-height: 34px;
        padding: 0 10px;
        font-size: 12px;
      }

      .hero {
        padding: 28px 16px 26px;
      }

      h1 {
        font-size: 44px;
      }

      .intro {
        font-size: 14px;
      }

      .thumb-rail {
        top: 62px;
        padding: 8px 14px;
      }

      .thumb {
        width: 74px;
      }

      .section-head {
        align-items: start;
        flex-direction: column;
        padding: 34px 16px 18px;
      }

      .attachment-grid {
        grid-template-columns: 1fr;
      }

      .attachment-card {
        min-height: 116px;
        padding: 18px;
      }

      .page {
        width: calc(100% - 22px);
        margin-bottom: 30px;
        scroll-margin-top: 126px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#top" aria-label="回到首页">
      <strong>李宇佳作品集</strong>
      <span>Image Portfolio</span>
    </a>
    <nav class="jump" aria-label="作品集导航">
      <a href="#attachments">附件网页</a>
      <a href="#pages">页面</a>
      <a href="#page-26">末页</a>
    </nav>
    <div class="counter" id="counter">01 / 26</div>
  </header>

  <section class="hero" id="top">
    <div class="hero-copy">
      <div class="eyebrow">Portfolio Archive</div>
      <h1>李宇佳<br>作品集</h1>
      <p class="intro">使用“作品集图片版”中的 1-26 文件按顺序排版展示，保留每张图的原始方向与比例。</p>
      <div class="hero-actions">
        <a class="button" href="#page-01">开始浏览</a>
        <a class="button secondary" href="#attachments">附件网页</a>
        <a class="button secondary" href="#page-26">查看末页</a>
      </div>
    </div>
    <div class="cover-stage" aria-hidden="true">
      <div class="cover-stack">
        <img src="作品集图片版/26.jpg" alt="">
        <img src="作品集图片版/1.jpg" alt="">
      </div>
    </div>
  </section>

  <section class="attachments" id="attachments" aria-labelledby="attachments-title">
    <div class="section-head">
      <h2 id="attachments-title">附件网页</h2>
      <p>2 interactive web appendices</p>
    </div>
    <div class="attachment-grid">
      <a class="attachment-card" href="作品集图片版/StoryLine.html" target="_blank" rel="noopener">
        <div>
          <span>Appendix 01</span>
          <strong>StoryLine</strong>
          <p>整合交互网页附件，点击后在新标签页打开。</p>
        </div>
        <div class="attachment-arrow" aria-hidden="true">→</div>
      </a>
      <a class="attachment-card" href="作品集图片版/童声绘语家长端.html" target="_blank" rel="noopener">
        <div>
          <span>Appendix 02</span>
          <strong>声绘童语家长端</strong>
          <p>家长端网页附件，点击后在新标签页打开。</p>
        </div>
        <div class="attachment-arrow" aria-hidden="true">→</div>
      </a>
    </div>
  </section>

  <nav class="thumb-rail" aria-label="页面缩略导航" id="thumbs"></nav>

  <main id="pages">
    <section aria-labelledby="pages-title">
      <div class="section-head">
        <h2 id="pages-title">作品集图片版</h2>
        <p>26 pages · original image order</p>
      </div>
      <div id="page-list"></div>
    </section>
  </main>

  <button class="back-top" type="button" aria-label="回到顶部">↑</button>

  <script>
    const assets = [
      "作品集图片版/1.jpg",
      "作品集图片版/2.jpg",
      "作品集图片版/3.jpg",
      "作品集图片版/4.jpg",
      "作品集图片版/5.jpg",
      "作品集图片版/6.jpg",
      "作品集图片版/7.jpg",
      "作品集图片版/8.jpg",
      "作品集图片版/9.jpg",
      "作品集图片版/10.jpg",
      "作品集图片版/11.jpg",
      "作品集图片版/12.jpg",
      "作品集图片版/13.jpg",
      "作品集图片版/14.jpg",
      "作品集图片版/15.jpg",
      "作品集图片版/16.jpg",
      "作品集图片版/17.jpg",
      "作品集图片版/18.jpg",
      "作品集图片版/19.jpg",
      "作品集图片版/20.jpg",
      "作品集图片版/21.jpg",
      "作品集图片版/22.jpg",
      "作品集图片版/23.jpg",
      "作品集图片版/web-converted/24.jpg",
      "作品集图片版/web-converted/25.jpg",
      "作品集图片版/26.jpg"
    ];

    const pageList = document.querySelector("#page-list");
    const thumbRail = document.querySelector("#thumbs");
    const counter = document.querySelector("#counter");
    const backTop = document.querySelector(".back-top");
    const total = assets.length;

    const pad = (value) => String(value).padStart(2, "0");

    pageList.innerHTML = assets.map((src, index) => {
      const number = index + 1;
      const loading = index === 0 ? "eager" : "lazy";
      return `
        <article class="page" id="page-${pad(number)}" data-page="${number}">
          <div class="page-shell">
            <img src="${src}" loading="${loading}" alt="作品集第 ${number} 页">
          </div>
          <div class="page-label"><span>作品集图片版</span><span>${pad(number)} / ${total}</span></div>
        </article>
      `;
    }).join("");

    thumbRail.innerHTML = assets.map((src, index) => {
      const number = index + 1;
      return `<a class="thumb" href="#page-${pad(number)}"><img src="${src}" alt="第 ${number} 页"></a>`;
    }).join("");

    const pages = [...document.querySelectorAll(".page")];
    const thumbs = [...document.querySelectorAll(".thumb")];

    const setActive = (index) => {
      counter.textContent = `${pad(index + 1)} / ${total}`;
      thumbs.forEach((thumb, thumbIndex) => {
        thumb.classList.toggle("is-active", thumbIndex === index);
      });
      const activeThumb = thumbs[index];
      if (activeThumb) {
        activeThumb.scrollIntoView({ inline: "center", block: "nearest", behavior: "smooth" });
      }
    };

    const observer = new IntersectionObserver((entries) => {
      const visible = entries
        .filter((entry) => entry.isIntersecting)
        .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
      if (!visible) return;
      const index = pages.indexOf(visible.target);
      if (index >= 0) setActive(index);
    }, {
      rootMargin: "-35% 0px -45% 0px",
      threshold: [0.15, 0.35, 0.55, 0.75]
    });

    pages.forEach((page) => observer.observe(page));
    setActive(0);

    backTop.addEventListener("click", () => {
      document.querySelector("#top").scrollIntoView({ behavior: "smooth" });
    });

    window.addEventListener("keydown", (event) => {
      if (!["ArrowLeft", "ArrowRight"].includes(event.key)) return;
      const current = Math.max(0, pages.findIndex((page) => {
        const rect = page.getBoundingClientRect();
        return rect.top <= window.innerHeight * 0.45 && rect.bottom >= window.innerHeight * 0.45;
      }));
      const next = event.key === "ArrowRight"
        ? Math.min(pages.length - 1, current + 1)
        : Math.max(0, current - 1);
      pages[next].scrollIntoView({ behavior: "smooth", block: "start" });
    });
  </script>
</body>
</html>
